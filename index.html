<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#5A6FD6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Meteor Focus">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meteor Focus — דשבורד דיווחי שאלות</title>
<style>
  :root {
    --grad-start: #5A6FD6;
    --grad-end:   #8F73C8;
    --header-bg:  #EEEDF8;
    --red-bg:     #FEF2F2;
    --ink:        #1F2244;
    --ink-soft:   #4B4F73;
    --muted:      #7A7F9C;
    --line:       #E4E2F2;
    --card:       #FFFFFF;
    --bg:         #F7F6FC;
    --ok:         #2E9E6A;
    --warn:       #D97706;
    --danger:     #DC2626;
    --info:       #2563EB;
    --shadow:     0 1px 2px rgba(31,34,68,.06), 0 4px 12px rgba(31,34,68,.06);
    --radius:     14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Heebo, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    color: #fff;
    padding: 18px 16px calc(18px + env(safe-area-inset-top, 0px));
    padding-top: calc(18px + env(safe-area-inset-top, 0px));
    box-shadow: var(--shadow);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -.01em; }
  header .sub { font-size: 12.5px; opacity: .85; margin-top: 4px; }
  header .stats { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; font-size: 13px; }
  header .stats b { font-weight: 700; }

  /* Filter bar */
  .filterbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 10px 12px;
    overflow-x: auto;
    white-space: nowrap;
    position: sticky; top: var(--header-h, 0); z-index: 9;
    -webkit-overflow-scrolling: touch;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px;
    margin-inline-start: 6px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 13px; color: var(--ink-soft);
    cursor: pointer; user-select: none;
    transition: background .15s, color .15s, border-color .15s;
  }
  .pill:first-child { margin-inline-start: 0; }
  .pill:hover { background: var(--header-bg); }
  .pill.active {
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    color: #fff; border-color: transparent;
  }
  .pill .count { font-weight: 700; opacity: .8; }

  /* Main grid */
  main { padding: 14px; max-width: 1400px; margin: 0 auto; }
  .grid {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: minmax(280px, 340px) 1fr; }
  }

  .col h2 {
    margin: 0 0 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    padding-inline-start: 4px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
    transition: opacity .2s;
  }
  .card.handled { opacity: .55; }
  .card-head {
    padding: 12px 14px 10px;
    background: var(--header-bg);
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .card-head.red { background: var(--red-bg); }
  .card-body { padding: 12px 14px; }

  .qtext {
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 8px;
    line-height: 1.45;
  }
  .issue {
    font-size: 14px;
    color: var(--ink-soft);
    background: #FAFAFD;
    border-inline-start: 3px solid var(--grad-start);
    padding: 8px 10px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .issue.empty {
    color: var(--muted);
    font-style: italic;
    border-inline-start-color: var(--line);
  }

  /* Tags */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: #fff;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    line-height: 1.4;
    white-space: nowrap;
  }
  .tag.today    { background: #FFF7E6; border-color: #FCD9A0; color: #8A5A00; }
  .tag.unread   { background: #FFEDED; border-color: #F8B4B4; color: #9B1C1C; }
  .tag.paid     { background: #F3EFFC; border-color: #D6CBF2; color: #5A3FB8; }
  .tag.repeat   { background: #FEF9C3; border-color: #FACC15; color: #854D0E; }
  .tag.restore  { background: #E0F2FE; border-color: #7DD3FC; color: #075985; }
  .tag.status-wrong       { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
  .tag.status-right       { background: #DCFCE7; border-color: #86EFAC; color: #166534; }
  .tag.status-notSubmited { background: #F1F5F9; border-color: #CBD5E1; color: #475569; }
  .tag.status-submitedNotFinal { background: #FEF3C7; border-color: #FCD34D; color: #92400E; }

  .tag.cls-phrasing    { background: #F3E8FF; border-color: #D8B4FE; color: #6B21A8; }
  .tag.cls-wrong       { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
  .tag.cls-multiple    { background: #FFEDD5; border-color: #FDBA74; color: #9A3412; }
  .tag.cls-explanation { background: #DBEAFE; border-color: #93C5FD; color: #1E40AF; }
  .tag.cls-other       { background: #F1F5F9; border-color: #CBD5E1; color: #475569; }

  .meta {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .meta b { color: var(--ink-soft); font-weight: 600; }

  /* Expand area */
  details { margin-top: 12px; }
  details summary {
    cursor: pointer;
    color: var(--grad-start);
    font-weight: 600;
    font-size: 13.5px;
    list-style: none;
    padding: 6px 0;
    user-select: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before {
    content: "▼ ";
    display: inline-block;
    transform: rotate(-90deg);
    transition: transform .15s;
    margin-inline-end: 6px;
    font-size: 10px;
  }
  details[open] summary::before { transform: rotate(0); }
  .answers { margin: 8px 0 0; padding: 0; list-style: none; display: grid; gap: 6px; }
  .answers li {
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    font-size: 13.5px;
    display: flex; gap: 8px; align-items: start;
  }
  .answers li.correct { background: #ECFDF5; border-color: #6EE7B7; }
  .answers li .lbl {
    font-weight: 700; color: var(--muted); min-width: 1.4em;
  }
  .answers li.correct .lbl { color: var(--ok); }
  .explanation {
    margin-top: 10px;
    padding: 10px 12px;
    background: #FAFAFD;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--ink-soft);
    white-space: pre-wrap;
    border-inline-start: 3px solid #C7BEEB;
  }

  /* Actions */
  .actions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .btn {
    appearance: none;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    padding: 7px 11px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: background .15s, border-color .15s, color .15s, transform .05s;
  }
  .btn:hover { background: var(--header-bg); border-color: #C7BEEB; color: var(--ink); }
  .btn:active { transform: scale(.97); }
  .btn.done {
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    color: #fff; border-color: transparent;
  }
  .btn.done.is-handled {
    background: #DCFCE7; color: #166534; border: 1px solid #86EFAC;
  }
  .btn.copied { background: #DCFCE7; color: #166534; border-color: #86EFAC; }

  /* Empty / loader / error */
  .state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
  }
  .state .err { color: var(--danger); }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--line);
    border-top-color: var(--grad-start);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(18px + env(safe-area-inset-bottom));
    inset-inline: 0;
    margin: 0 auto;
    width: max-content;
    max-width: 92vw;
    background: rgba(31,34,68,.94);
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Small Q-id display */
  .qid {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    direction: ltr;
    unicode-bidi: isolate;
  }

  /* Refresh button (top-left) */
  .refresh {
    position: absolute;
    top: calc(14px + env(safe-area-inset-top, 0px));
    inset-inline-start: 14px;
    background: rgba(255,255,255,.18);
    color: #fff;
    border: 1px solid rgba(255,255,255,.3);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
  }
  .refresh:active { transform: scale(.95); }
</style>
</head>
<body>

<header>
  <button class="refresh" id="refresh" title="רענון" aria-label="רענון">↻</button>
  <h1>Meteor Focus — דיווחי שאלות</h1>
  <div class="sub" id="updated">טוען…</div>
  <div class="stats" id="stats"></div>
</header>

<nav class="filterbar" id="filterbar"></nav>

<main>
  <div id="root">
    <div class="state"><div class="spinner"></div>טוען נתונים…</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const DATA_URL = "./data.json";
  const HANDLED_KEY = "mf.handled.v1";

  // ---- helpers ----
  const $ = (sel, root=document) => root.querySelector(sel);
  const el = (tag, attrs={}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") node.className = v;
      else if (k === "html") node.innerHTML = v;
      else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
      else if (v !== false && v != null) node.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      node.append(c.nodeType ? c : document.createTextNode(String(c)));
    }
    return node;
  };

  const isToday = (iso) => {
    if (!iso) return false;
    const d = new Date(iso);
    const now = new Date();
    return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
  };

  const fmtDateTime = (iso) => {
    if (!iso) return "";
    try {
      return new Date(iso).toLocaleString("he-IL", {
        day: "2-digit", month: "2-digit", year: "2-digit",
        hour: "2-digit", minute: "2-digit"
      });
    } catch { return iso; }
  };
  const fmtRelative = (iso) => {
    if (!iso) return "";
    const d = new Date(iso); const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return "עכשיו";
    if (diff < 3600) return `לפני ${Math.floor(diff/60)} ד׳`;
    if (diff < 86400) return `לפני ${Math.floor(diff/3600)} ש׳`;
    if (diff < 86400*7) return `לפני ${Math.floor(diff/86400)} ימים`;
    return fmtDateTime(iso);
  };

  // ---- handled persistence ----
  const loadHandled = () => {
    try { return new Set(JSON.parse(localStorage.getItem(HANDLED_KEY) || "[]")); }
    catch { return new Set(); }
  };
  const saveHandled = (set) => {
    try { localStorage.setItem(HANDLED_KEY, JSON.stringify([...set])); } catch {}
  };
  const handled = loadHandled();

  // ---- toast ----
  const toastEl = $("#toast");
  let toastTimer = null;
  const toast = (msg) => {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1700);
  };

  // ---- copy ----
  const copy = async (text, btn) => {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
      if (btn) {
        const orig = btn.innerHTML;
        btn.classList.add("copied");
        btn.innerHTML = "✓ הועתק";
        setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = orig; }, 1100);
      }
      toast("הועתק ללוח");
    } catch (e) {
      toast("העתקה נכשלה");
    }
  };

  // ---- classification labels ----
  const CLS = {
    phrasing:    { label: "ניסוח",          icon: "🟣" },
    wrong:       { label: "תשובה שגויה",    icon: "🔴" },
    multiple:    { label: "יותר מתשובה",     icon: "🟠" },
    explanation: { label: "הסבר לא ברור",   icon: "🔵" },
    other:       { label: "אחר",            icon: "⚪" }
  };

  const STATUS = {
    wrong:             "ענה שגוי",
    right:             "ענה נכון",
    notSubmited:       "לא הוגש",
    submitedNotFinal:  "הוגש (לא סופי)"
  };

  // ---- filter state ----
  let activeFilter = "all"; // all | unread | today | <classification>
  let dataset = null;
  let qidCounts = {}; // q-id -> count

  // ---- render header / stats ----
  const renderHead = (data) => {
    $("#updated").textContent = "עודכן: " + fmtDateTime(data.fetched_at);
    const todayCount = data.threads.filter(t => isToday(t.date)).length;
    $("#stats").innerHTML = "";
    [
      ["סה״כ", data.total_count ?? data.threads.length],
      ["לא נקרא", data.unread_count ?? data.threads.filter(t => t.isUnread).length],
      ["היום", todayCount]
    ].forEach(([k, v]) => {
      $("#stats").append(el("span", {}, k + ": ", el("b", {}, String(v))));
    });
  };

  const renderFilters = (data) => {
    const counts = { all: data.threads.length, unread: 0, today: 0, phrasing:0, wrong:0, multiple:0, explanation:0, other:0 };
    for (const t of data.threads) {
      if (t.isUnread) counts.unread++;
      if (isToday(t.date)) counts.today++;
      if (t.classification && counts[t.classification] != null) counts[t.classification]++;
    }

    const bar = $("#filterbar");
    bar.innerHTML = "";

    const pill = (key, label, icon) => {
      const p = el("button", {
        class: "pill" + (activeFilter === key ? " active" : ""),
        type: "button",
        onclick: () => { activeFilter = key; renderFilters(dataset); renderList(dataset); }
      },
        icon ? icon + " " : "",
        label,
        " ",
        el("span", { class: "count" }, String(counts[key] ?? 0))
      );
      bar.append(p);
    };

    pill("all",         "הכל");
    pill("unread",      "לא נקרא", "📬");
    pill("today",       "היום", "✨");
    pill("phrasing",    CLS.phrasing.label,    CLS.phrasing.icon);
    pill("wrong",       CLS.wrong.label,       CLS.wrong.icon);
    pill("multiple",    CLS.multiple.label,    CLS.multiple.icon);
    pill("explanation", CLS.explanation.label, CLS.explanation.icon);
    pill("other",       CLS.other.label,       CLS.other.icon);
  };

  // ---- card builders ----
  const buildTags = (t, isTypeA) => {
    const tags = [];
    if (isToday(t.date)) tags.push(el("span", { class: "tag today" }, "✨ היום"));
    if (t.isUnread)     tags.push(el("span", { class: "tag unread" }, "📬 לא נקרא"));

    if (isTypeA) {
      const c = t.classification;
      if (c && CLS[c]) {
        tags.push(el("span", { class: "tag cls-" + c }, CLS[c].icon + " " + CLS[c].label));
      }
      const ud = t.body?.user_details || {};
      if ((ud.roleType || []).includes("Paid")) {
        tags.push(el("span", { class: "tag paid" }, "💎 Paid"));
      }
      const ed = t.body?.extra_details || {};
      if (ed.status && STATUS[ed.status]) {
        tags.push(el("span", { class: "tag status-" + ed.status }, STATUS[ed.status]));
      }
      const qid = ed.question_id || ed.question?.question_id;
      if (qid && qidCounts[qid] > 1) {
        tags.push(el("span", { class: "tag repeat" }, `🔁 דווחה ${qidCounts[qid]}×`));
      }
      if (ed.is_restoration || ed.question?.is_restoration) {
        const cycle = ed.restoration_cycle || ed.question?.restoration_cycle;
        tags.push(el("span", { class: "tag restore" }, "🔁 שיחזור" + (cycle ? " · " + cycle : "")));
      }
    }
    return tags;
  };

  const buildAnswersList = (ed) => {
    const q = ed.question || ed;
    const items = [
      { label: "✓", text: q.right_answer,  correct: true  },
      { label: "✗", text: q.false_one,     correct: false },
      { label: "✗", text: q.false_two,     correct: false },
      { label: "✗", text: q.false_three,   correct: false }
    ].filter(a => a.text);

    return el("ul", { class: "answers" },
      ...items.map(a =>
        el("li", { class: a.correct ? "correct" : "" },
          el("span", { class: "lbl" }, a.label),
          el("span", {}, a.text)
        )
      )
    );
  };

  const buildQuestionCopyText = (ed) => {
    const q = ed.question || ed;
    const parts = [];
    parts.push("שאלה: " + (q.question_text || ""));
    if (q.right_answer) parts.push("✓ " + q.right_answer);
    if (q.false_one)    parts.push("✗ " + q.false_one);
    if (q.false_two)    parts.push("✗ " + q.false_two);
    if (q.false_three)  parts.push("✗ " + q.false_three);
    if (q.explanation)  parts.push("\nהסבר:\n" + q.explanation);
    return parts.join("\n");
  };

  const gmailUrl = (id) => `https://mail.google.com/mail/u/0/#inbox/${id}`;

  const cardTypeA = (t) => {
    const ed = t.body?.extra_details || {};
    const q  = ed.question || ed;
    const ud = t.body?.user_details || {};
    const qid = ed.question_id || q.question_id || "";
    const uid = ud.userId || ud.sub || ed.user_id || "";

    const isHandled = handled.has(t.id);
    const card = el("article", { class: "card" + (isHandled ? " handled" : ""), "data-id": t.id });

    card.append(
      el("div", { class: "card-head" }, ...buildTags(t, true))
    );

    const body = el("div", { class: "card-body" });

    if (q.question_text) {
      body.append(el("div", { class: "qtext" }, q.question_text));
    }

    const issueText = (t.body?.issue_text || "").trim();
    body.append(
      issueText
        ? el("div", { class: "issue" }, issueText)
        : el("div", { class: "issue empty" }, "— ללא טקסט פנייה —")
    );

    const metaBits = [];
    if (ed.category)    metaBits.push(["קטגוריה", ed.category]);
    if (ed.division)    metaBits.push(["חטיבה", ed.division]);
    if (ed.subdivision) metaBits.push(["תת־חטיבה", ed.subdivision]);
    if (ed.level)       metaBits.push(["רמה", ed.level]);
    if (t.date)         metaBits.push(["", fmtRelative(t.date)]);

    if (metaBits.length) {
      const meta = el("div", { class: "meta" });
      metaBits.forEach(([k, v]) => {
        meta.append(el("span", {}, k ? [el("b", {}, k + ":"), " ", v] : v));
      });
      body.append(meta);
    }

    if (q.question_text || q.explanation) {
      const det = el("details", {},
        el("summary", {}, "הצג שאלה מלאה והסבר")
      );
      if (q.right_answer || q.false_one) det.append(buildAnswersList(ed));
      if (q.explanation) det.append(el("div", { class: "explanation" }, q.explanation));
      body.append(det);
    }

    // actions
    const actions = el("div", { class: "actions" });
    const mkCopyBtn = (label, getter) => {
      const b = el("button", { class: "btn", type: "button" }, label);
      b.addEventListener("click", () => copy(getter(), b));
      return b;
    };

    actions.append(mkCopyBtn("📋 שאלה", () => buildQuestionCopyText(ed)));
    if (qid) actions.append(mkCopyBtn("📋 Q-ID", () => qid));
    if (uid) actions.append(mkCopyBtn("📋 User-ID", () => uid));
    actions.append(mkCopyBtn("📋 קישור Gmail", () => gmailUrl(t.id)));

    const doneBtn = el("button", {
      class: "btn done" + (isHandled ? " is-handled" : ""),
      type: "button"
    }, isHandled ? "✓ טופל" : "✓ סמן כטופל");
    doneBtn.addEventListener("click", () => {
      if (handled.has(t.id)) {
        handled.delete(t.id);
        card.classList.remove("handled");
        doneBtn.classList.remove("is-handled");
        doneBtn.textContent = "✓ סמן כטופל";
      } else {
        handled.add(t.id);
        card.classList.add("handled");
        doneBtn.classList.add("is-handled");
        doneBtn.textContent = "✓ טופל";
      }
      saveHandled(handled);
    });
    actions.append(doneBtn);

    if (qid) {
      body.append(el("div", { class: "qid", style: "margin-top:8px" }, "Q-ID: " + qid));
    }

    body.append(actions);
    card.append(body);
    return card;
  };

  const cardTypeB = (t) => {
    const isHandled = handled.has(t.id);
    const card = el("article", { class: "card" + (isHandled ? " handled" : ""), "data-id": t.id });

    card.append(
      el("div", { class: "card-head red" }, ...buildTags(t, false), el("span", { class: "tag" }, "פנייה חדשה"))
    );

    const ud = t.body?.user_details || {};
    const issueText = (t.body?.issue_text || "").trim();
    const body = el("div", { class: "card-body" });

    body.append(
      issueText
        ? el("div", { class: "issue" }, issueText)
        : el("div", { class: "issue empty" }, "— ללא טקסט פנייה —")
    );

    const metaBits = [];
    if (ud.name)  metaBits.push(["שם", ud.name]);
    if (ud.email) metaBits.push(["אימייל", ud.email]);
    if (ud.phone) metaBits.push(["טלפון", ud.phone]);
    if (t.date)   metaBits.push(["", fmtRelative(t.date)]);
    if (metaBits.length) {
      const meta = el("div", { class: "meta" });
      metaBits.forEach(([k, v]) => {
        meta.append(el("span", {}, k ? [el("b", {}, k + ":"), " ", v] : v));
      });
      body.append(meta);
    }

    const actions = el("div", { class: "actions" });
    actions.append(
      (() => {
        const b = el("button", { class: "btn", type: "button" }, "📋 קישור Gmail");
        b.addEventListener("click", () => copy(gmailUrl(t.id), b));
        return b;
      })()
    );
    if (ud.email) {
      const b = el("button", { class: "btn", type: "button" }, "📋 אימייל");
      b.addEventListener("click", () => copy(ud.email, b));
      actions.append(b);
    }

    const doneBtn = el("button", {
      class: "btn done" + (isHandled ? " is-handled" : ""),
      type: "button"
    }, isHandled ? "✓ טופל" : "✓ סמן כטופל");
    doneBtn.addEventListener("click", () => {
      if (handled.has(t.id)) {
        handled.delete(t.id); card.classList.remove("handled");
        doneBtn.classList.remove("is-handled"); doneBtn.textContent = "✓ סמן כטופל";
      } else {
        handled.add(t.id); card.classList.add("handled");
        doneBtn.classList.add("is-handled"); doneBtn.textContent = "✓ טופל";
      }
      saveHandled(handled);
    });
    actions.append(doneBtn);

    body.append(actions);
    card.append(body);
    return card;
  };

  // ---- list rendering ----
  const matchesFilter = (t) => {
    if (activeFilter === "all")    return true;
    if (activeFilter === "unread") return !!t.isUnread;
    if (activeFilter === "today")  return isToday(t.date);
    return t.classification === activeFilter;
  };

  const renderList = (data) => {
    const root = $("#root");
    root.innerHTML = "";

    const typeA = [], typeB = [];
    for (const t of data.threads) {
      const ed = t.body?.extra_details;
      (ed && Object.keys(ed).length ? typeA : typeB).push(t);
    }

    const filteredA = typeA.filter(matchesFilter);
    // Type B never has classification, so under classification filters it stays empty
    const filteredB = (activeFilter === "all" || activeFilter === "unread" || activeFilter === "today")
      ? typeB.filter(matchesFilter)
      : [];

    const sortDesc = (arr) => arr.sort((a, b) => new Date(b.date) - new Date(a.date));
    sortDesc(filteredA); sortDesc(filteredB);

    const grid = el("div", { class: "grid" });

    // Left column: new inquiries (Type B)
    const colB = el("section", { class: "col" },
      el("h2", {}, `פניות חדשות (${filteredB.length})`)
    );
    if (filteredB.length === 0) {
      colB.append(el("div", { class: "state" }, "אין פניות תחת הסינון הנוכחי"));
    } else {
      filteredB.forEach(t => colB.append(cardTypeB(t)));
    }

    // Right column: question reports (Type A)
    const colA = el("section", { class: "col" },
      el("h2", {}, `דיווחי שאלות (${filteredA.length})`)
    );
    if (filteredA.length === 0) {
      colA.append(el("div", { class: "state" }, "אין דיווחים תחת הסינון הנוכחי"));
    } else {
      filteredA.forEach(t => colA.append(cardTypeA(t)));
    }

    grid.append(colB, colA);
    root.append(grid);
  };

  // ---- precompute Q-id counts ----
  const computeQidCounts = (data) => {
    const c = {};
    for (const t of data.threads) {
      const ed = t.body?.extra_details || {};
      const qid = ed.question_id || ed.question?.question_id;
      if (qid) c[qid] = (c[qid] || 0) + 1;
    }
    return c;
  };

  // ---- load ----
  const load = async () => {
    const root = $("#root");
    root.innerHTML = `<div class="state"><div class="spinner"></div>טוען נתונים…</div>`;
    try {
      const url = DATA_URL + "?t=" + Date.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      dataset = data;
      qidCounts = computeQidCounts(data);
      renderHead(data);
      renderFilters(data);
      renderList(data);
    } catch (e) {
      root.innerHTML = "";
      root.append(el("div", { class: "state" },
        el("div", { class: "err" }, "טעינת הנתונים נכשלה"),
        el("div", { style: "margin-top:8px;font-size:13px" }, String(e.message || e))
      ));
    }
  };

  $("#refresh").addEventListener("click", load);
  load();
})();

<body>
<h1>תור דיווחים — Meteor Focus</h1>
<div class="sub" id="summary">טוען…</div>

<div class="status-bar" id="statusBar">
  <span id="statusText"><span class="spin"></span> טוען נתונים…</span>
  <button class="btn primary" id="refreshBtn" style="margin-right: auto;">🔄 רענן</button>
</div>

<div class="bar" id="filterBar" style="display:none;">
  <button class="btn" id="allBtn">🕒 הכל</button>
  <input type="search" id="searchBox" placeholder="🔍 חיפוש בטקסטים, שאלות, משתמשים…">
  <label class="chk"><input type="checkbox" id="unreadOnly"> 📬 לא נקראו</label>
  <label class="chk"><input type="checkbox" id="paidOnly"> 💎 משלמים</label>
</div>

<div class="grid" id="grid" style="display:none;">
  <div class="section section-B">
    <div class="section-title">📩 פניות חדשות <span class="count" id="countB">0</span></div>
    <div id="listB"></div>
  </div>
  <div class="section section-A">
    <div class="section-title">🐛 דיווחי שאלות <span class="count" id="countA">0</span></div>
    <div id="listA"></div>
  </div>
</div>

<details class="handled-box" id="handledBox" style="display:none;">
  <summary id="handledSummary">✓ טופלו (0)</summary>
  <div class="handled-list" id="handledList"></div>
</details>

<script>
// ======== Configuration ========
const DATA_URL = './data.json';
const STORAGE_KEY = 'meteor-focus-handled-v1';

// ======== State ========
const state = {
  data: null,
  fetchedAt: null,
  loadedAt: null,
  error: null,
  handled: new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')),
  paidOnly: false,
  unreadOnly: false,
  search: ''
};

// ======== Constants ========
const CLS = {
  phrasing: { emoji: '🟣', text: 'ניסוח' },
  wrong: { emoji: '🔴', text: 'תשובה שגויה' },
  multiple: { emoji: '🟠', text: 'יותר מתשובה אחת' },
  explanation: { emoji: '🔵', text: 'הסבר לא ברור' },
  other: { emoji: '⚪', text: 'אחר' }
};
const STATUS = {
  wrong: { cls: 'status-wrong', text: 'טעה' },
  right: { cls: 'status-right', text: 'נכון' },
  notSubmited: { cls: 'status-ns', text: 'לא הגיש' },
  submitedNotFinal: { cls: 'status-ns', text: 'טיוטה' }
};

// ======== Helpers ========
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function sameDay(a, b) { const d1 = new Date(a), d2 = new Date(b); return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate(); }
function fmtDate(s) {
  try {
    const d = new Date(s);
    const time = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    if (sameDay(d, new Date())) return time;
    return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' }) + ' ' + time;
  } catch { return s; }
}
function fmtRel(iso) {
  if (!iso) return '—';
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 0) return 'עכשיו';
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'עכשיו';
  if (mins < 60) return `לפני ${mins} דק׳`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `לפני ${hrs} שעות`;
  return `לפני ${Math.floor(hrs / 24)} ימים`;
}
function truncId(s, n = 8) {
  if (!s) return '—';
  return s.length > n * 2 ? s.slice(0, n) + '…' + s.slice(-4) : s;
}
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy'); ta.remove();
      return ok;
    } catch { return false; }
  }
}
function showToast(msg) {
  const prev = document.querySelector('.toast');
  if (prev) prev.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}
function saveHandled() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...state.handled]));
}

// ======== Data shaping ========
function getThreads() {
  if (!state.data?.threads) return [];
  return state.data.threads
    .map(t => ({ ...t, type: t.body?.extra_details ? 'A' : 'B' }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
}
function getQuestionCounts(threads) {
  const c = {};
  threads.forEach(t => {
    const qid = t.body?.extra_details?.question_id;
    if (qid) c[qid] = (c[qid] || 0) + 1;
  });
  return c;
}
function getVisible(threads) {
  const s = state.search.trim().toLowerCase();
  return threads.filter(t => {
    if (state.handled.has(t.id)) return false;
    if (state.unreadOnly && !t.isUnread) return false;
    const isPaid = (t.body?.user_details?.roleType || []).includes('Paid');
    if (state.paidOnly && !isPaid) return false;
    if (s) {
      const hay = JSON.stringify(t.body || {}).toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });
}

// ======== Rendering ========
function renderCardA(item, repeatCount) {
  const b = item.body;
  const ed = b.extra_details || {};
  const isPaid = (b.user_details?.roleType || []).includes('Paid');
  const today = sameDay(item.date, new Date());
  const clsInfo = CLS[item.classification];
  const stat = ed.status && STATUS[ed.status];
  const gmailUrl = `https://mail.google.com/mail/u/0/#inbox/${item.id}`;
  const hasText = b.issue_text && b.issue_text.trim().length > 0;

  const distractors = [ed.false_one, ed.false_two, ed.false_three].filter(Boolean)
    .map(a => `<li class="distractor">✗ ${esc(a)}</li>`).join('');

  const qmetaParts = [];
  if (ed.category) qmetaParts.push(`<span>📚 <b>${esc(ed.category)}</b></span>`);
  if (ed.division) qmetaParts.push(`<span>· ${esc(ed.division)}</span>`);
  if (ed.subdivision) qmetaParts.push(`<span>· ${esc(ed.subdivision)}</span>`);
  if (ed.level) qmetaParts.push(`<span>· 🎯 ${esc(ed.level)}</span>`);
  if (ed.question_number != null) qmetaParts.push(`<span>· #${ed.question_number}</span>`);

  return `
    <div class="card" data-id="${esc(item.id)}">
      <div class="tags">
        ${today ? '<span class="tag today">✨ היום</span>' : ''}
        ${item.isUnread ? '<span class="tag unread">📬 לא נקרא</span>' : ''}
        ${clsInfo ? `<span class="tag ${item.classification}">${clsInfo.emoji} ${clsInfo.text}</span>` : ''}
        ${isPaid ? '<span class="tag paid">💎 Paid</span>' : '<span class="tag free">חינמי</span>'}
        ${stat ? `<span class="tag ${stat.cls}">${stat.text}</span>` : ''}
        ${repeatCount >= 2 ? `<span class="tag duplicate">🔁 דווחה ${repeatCount}×</span>` : ''}
        ${ed.is_restoration ? '<span class="tag restoration">🔁 שיחזור</span>' : ''}
        <span class="date-label">${esc(fmtDate(item.date))}</span>
      </div>
      <div class="meta-row">
        <span>💻 ${esc(b.os_details?.name || '—')} / ${esc(b.os_details?.os || '—')}</span>
        ${ed.question_id ? `<span>🆔 <span class="mono">${esc(truncId(ed.question_id, 8))}</span></span>` : ''}
        ${b.user_details?.userId ? `<span>👤 <span class="mono">${esc(truncId(b.user_details.userId, 10))}</span></span>` : ''}
      </div>
      <div class="issue-label">▸ בעיה</div>
      <div class="issue-text${hasText ? '' : ' empty'}">${hasText ? esc(b.issue_text) : '(אין טקסט תלונה — המשתמש שלח דיווח ריק)'}</div>
      ${qmetaParts.length ? `<div class="qmeta">${qmetaParts.join('')}</div>` : ''}
      ${ed.question_text ? `
        <details>
          <summary>הצג שאלה ותשובות</summary>
          <div class="qbox">
            <div class="q-title">${esc(ed.question_text)}</div>
            <ul>
              ${ed.right_answer ? `<li class="correct">✓ ${esc(ed.right_answer)}</li>` : ''}
              ${distractors}
            </ul>
            ${ed.explanation ? `<div class="q-expl"><b>הסבר:</b> ${esc(ed.explanation)}</div>` : ''}
          </div>
        </details>
      ` : ''}
      <div class="actions">
        ${ed.question_text ? `<button class="action" data-act="copy-q">📋 שאלה</button>` : ''}
        ${ed.question_id ? `<button class="action" data-act="copy-qid">📋 Q-ID</button>` : ''}
        ${b.user_details?.userId ? `<button class="action" data-act="copy-uid">📋 User-ID</button>` : ''}
        <button class="action" data-act="copy-url">📋 קישור Gmail</button>
        <button class="action done" data-act="handle">✓ טופל</button>
      </div>
    </div>`;
}
function renderCardB(item) {
  const b = item.body;
  const isPaid = (b.user_details?.roleType || []).includes('Paid');
  const today = sameDay(item.date, new Date());
  return `
    <div class="card typeB" data-id="${esc(item.id)}">
      <div class="tags">
        ${today ? '<span class="tag today">✨ היום</span>' : ''}
        ${item.isUnread ? '<span class="tag unread">📬 לא נקרא</span>' : ''}
        ${isPaid ? '<span class="tag paid">💎 Paid</span>' : '<span class="tag free">חינמי</span>'}
        <span class="date-label">${esc(fmtDate(item.date))}</span>
      </div>
      <div class="issue-text">${esc(b.issue_text || '(אין טקסט)')}</div>
      <div class="meta-row">
        <span>💻 ${esc(b.os_details?.name || '—')} / ${esc(b.os_details?.os || '—')}</span>
        ${b.user_details?.userId ? `<span>👤 <span class="mono">${esc(truncId(b.user_details.userId, 8))}</span></span>` : ''}
      </div>
      <div class="actions">
        ${b.user_details?.userId ? `<button class="action" data-act="copy-uid">📋 User-ID</button>` : ''}
        <button class="action" data-act="copy-url">📋 קישור Gmail</button>
        <button class="action done" data-act="handle">✓ טופל</button>
      </div>
    </div>`;
}
function buildQuestionCopy(ed) {
  const parts = [];
  if (ed.question_text) parts.push(ed.question_text.trim());
  parts.push('');
  const map = { a: ed.right_answer, b: ed.false_one, c: ed.false_two, d: ed.false_three };
  let answers;
  if (Array.isArray(ed.question_order) && ed.question_order.length === 4) {
    answers = ed.question_order.map(k => map[k]).filter(Boolean);
  } else {
    answers = [ed.right_answer, ed.false_one, ed.false_two, ed.false_three].filter(Boolean);
  }
  answers.forEach((a, i) => parts.push(`${i + 1}. ${a.trim()}`));
  if (ed.explanation) { parts.push(''); parts.push('הסבר:'); parts.push(ed.explanation.trim()); }
  return parts.join('\n');
}

function render() {
  const threads = getThreads();
  const visible = getVisible(threads);
  const qCounts = getQuestionCounts(threads);
  const typeA = visible.filter(t => t.type === 'A');
  const typeB = visible.filter(t => t.type === 'B');
  const handledItems = threads.filter(t => state.handled.has(t.id));

  document.getElementById('summary').textContent =
    `מציג ${visible.length} מתוך ${threads.length} דיווחים · ${typeA.length} 🐛 · ${typeB.length} 📩 · ${handledItems.length} טופלו`;

  document.getElementById('countA').textContent = typeA.length;
  document.getElementById('countB').textContent = typeB.length;

  const listA = document.getElementById('listA');
  const listB = document.getElementById('listB');
  listA.innerHTML = typeA.length === 0
    ? `<div class="empty">אין דיווחי שאלות${visible.length === 0 && threads.length > 0 ? ' (סינון פעיל)' : ''}</div>`
    : typeA.map(t => renderCardA(t, qCounts[t.body?.extra_details?.question_id] || 0)).join('');
  listB.innerHTML = typeB.length === 0
    ? `<div class="empty">אין פניות כלליות</div>`
    : typeB.map(renderCardB).join('');

  const handledBox = document.getElementById('handledBox');
  if (handledItems.length > 0) {
    handledBox.style.display = '';
    document.getElementById('handledSummary').textContent = `✓ טופלו (${handledItems.length})`;
    document.getElementById('handledList').innerHTML = handledItems.map(t => `
      <div class="handled-item" data-id="${esc(t.id)}">
        <span>${t.type === 'A' ? '🐛' : '📩'}</span>
        <span class="t">${esc((t.body?.issue_text || '(ללא טקסט)').slice(0, 100))}</span>
        <span>${esc(fmtDate(t.date))}</span>
        <button class="action" data-act="unhandle">↩ החזר</button>
      </div>`).join('');
  } else {
    handledBox.style.display = 'none';
  }
}

function renderStatus() {
  const bar = document.getElementById('statusBar');
  const txt = document.getElementById('statusText');
  if (state.error) {
    bar.classList.add('error');
    txt.innerHTML = `🔴 <span><b>שגיאה:</b> ${esc(state.error)} · נסי לרענן</span>`;
  } else if (state.data) {
    bar.classList.remove('error');
    txt.innerHTML = `🟢 <span><b>חי</b> · Routine עדכנה ${fmtRel(state.data.fetched_at)} · נטען ${fmtRel(state.loadedAt)}</span>`;
  } else {
    txt.innerHTML = `<span class="spin"></span> טוען…`;
  }
}

// ======== Event handlers ========
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const card = btn.closest('[data-id]');
  if (!card) return;
  const id = card.dataset.id;
  const item = state.data?.threads.find(t => t.id === id);
  if (!item) return;
  const b = item.body;
  const ed = b?.extra_details || {};
  const act = btn.dataset.act;

  if (act === 'handle') {
    state.handled.add(id);
    saveHandled();
    render();
  } else if (act === 'unhandle') {
    state.handled.delete(id);
    saveHandled();
    render();
  } else if (act === 'copy-q') {
    const ok = await copyText(buildQuestionCopy(ed));
    showToast(ok ? 'הועתק: שאלה מלאה' : 'העתקה נכשלה');
  } else if (act === 'copy-qid') {
    const ok = await copyText(ed.question_id);
    showToast(ok ? 'הועתק: Q-ID' : 'העתקה נכשלה');
  } else if (act === 'copy-uid') {
    const ok = await copyText(b.user_details?.userId || '');
    showToast(ok ? 'הועתק: User-ID' : 'העתקה נכשלה');
  } else if (act === 'copy-url') {
    const ok = await copyText(`https://mail.google.com/mail/u/0/#inbox/${id}`);
    showToast(ok ? 'הועתק: קישור Gmail' : 'העתקה נכשלה');
  }
});

document.getElementById('searchBox').addEventListener('input', (e) => { state.search = e.target.value; render(); });
document.getElementById('unreadOnly').addEventListener('change', (e) => { state.unreadOnly = e.target.checked; render(); });
document.getElementById('paidOnly').addEventListener('change', (e) => { state.paidOnly = e.target.checked; render(); });
document.getElementById('allBtn').addEventListener('click', () => {
  state.search = ''; state.unreadOnly = false; state.paidOnly = false;
  document.getElementById('searchBox').value = '';
  document.getElementById('unreadOnly').checked = false;
  document.getElementById('paidOnly').checked = false;
  render();
});
document.getElementById('refreshBtn').addEventListener('click', fetchData);

// Re-fetch when user returns to the tab
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.data) {
    // only auto-refresh if data is older than 5 minutes
    const age = Date.now() - new Date(state.loadedAt).getTime();
    if (age > 5 * 60 * 1000) fetchData();
  }
});

// ======== Fetching ========
async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  state.error = null;
  renderStatus();
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    state.data = json;
    state.loadedAt = new Date().toISOString();
    document.getElementById('filterBar').style.display = '';
    document.getElementById('grid').style.display = '';
    renderStatus();
    render();
  } catch (e) {
    state.error = e.message || String(e);
    renderStatus();
  } finally {
    btn.disabled = false;
  }
}

// ======== Init ========
fetchData();

// Update relative times every 30 seconds
setInterval(() => { if (state.data) renderStatus(); }, 30000);
</script>
